<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODOリスト</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.5rem;
      color: #1a1a2e;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #6366f1;
    }

    .input-row button {
      padding: 10px 18px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #4f46e5;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f3f4f6;
    }

    li:last-child {
      border-bottom: none;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6366f1;
      cursor: pointer;
      flex-shrink: 0;
    }

    li .label {
      flex: 1;
      font-size: 0.95rem;
      color: #374151;
      word-break: break-word;
      transition: color 0.2s;
    }

    li.done .label {
      text-decoration: line-through;
      color: #9ca3af;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #d1d5db;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    li .delete-btn:hover {
      color: #ef4444;
      background: #fef2f2;
    }

    .empty {
      text-align: center;
      color: #9ca3af;
      font-size: 0.9rem;
      padding: 24px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>TODOリスト</h1>
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="新しいタスクを入力..." maxlength="100">
      <button onclick="addTask()">追加</button>
    </div>
    <ul id="taskList"></ul>
    <p class="empty" id="emptyMsg">タスクがありません</p>
  </div>

  <script>
    const input = document.getElementById('taskInput');
    const list = document.getElementById('taskList');
    const emptyMsg = document.getElementById('emptyMsg');

    let composing = false;
    input.addEventListener('compositionstart', () => { composing = true; });
    input.addEventListener('compositionend', () => { composing = false; });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !composing) addTask();
    });

    function addTask() {
      const text = input.value.trim();
      if (!text) return;

      const li = document.createElement('li');

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.addEventListener('change', () => {
        li.classList.toggle('done', checkbox.checked);
      });

      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = text;

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'delete-btn';
      deleteBtn.textContent = '✕';
      deleteBtn.title = '削除';
      deleteBtn.addEventListener('click', () => {
        li.remove();
        updateEmpty();
      });

      li.append(checkbox, label, deleteBtn);
      list.appendChild(li);

      input.value = '';
      input.focus();
      updateEmpty();
    }

    function updateEmpty() {
      emptyMsg.style.display = list.children.length === 0 ? 'block' : 'none';
    }

    updateEmpty();
  </script>
</body>
</html>
